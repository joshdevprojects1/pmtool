name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
        working-directory: server
      - run: npm run typecheck
        working-directory: server
      - run: npm ci
        working-directory: web
      - run: npm run typecheck
        working-directory: web
